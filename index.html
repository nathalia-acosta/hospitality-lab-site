<form action="https://formspree.io/f/xreyzjlk" method="POST">
  <!-- Anti-spam (honeypot). Bots lo llenan, humanos no. -->
  <input type="text" name="_gotcha" style="display:none" />

  <div class="form-grid">
    <label>
      <span>Nome Hotel</span>
      <input name="hotel" type="text" required placeholder="Es. Hotel Aurora" />
    </label>

    <label>
      <span>Sito web</span>
      <input name="website" type="url" placeholder="https://..." />
    </label>

    <label>
      <span>Email</span>
      <input name="email" type="email" required placeholder="name@hotel.com" />
    </label>

    <label>
      <span>Telefono (opzionale)</span>
      <input name="phone" type="tel" placeholder="+39..." />
    </label>
  </div>

  <label>
    <span>Messaggio</span>
    <textarea
      name="message"
      rows="5"
      required
      placeholder="Dimmi in 2 righe cosa vuoi migliorare (prenotazioni dirette, risposte, automazioni, ecc.)"
    ></textarea>
  </label>

  <input type="hidden" name="_subject" value="New lead — Hospitality Lab" />

  <button type="submit" class="btn primary">Richiedi Audit Gratuito</button>
</form>
